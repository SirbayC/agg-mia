[project]
name = "agg-mia"
version = "0.1.0"
description = "Membership inference attacks for code language models"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "accelerate",
    "datasets",
    "fuzzywuzzy",
    "huggingface-hub",
    "ninja",
    "numpy",
    "packaging",
    "plotly",
    "psutil",
    "pytest",
    "python-Levenshtein",
    "requests",
    "scikit-learn",
    "torch",
    "transformers",
    "typing_extensions",
    "vllm>=0.2.5",
]

[tool.uv]
package = false

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu126" }
